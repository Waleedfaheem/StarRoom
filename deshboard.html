<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StarRoom Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

</head>

<body>

<div class="dashboard">

<div class="top-bar">

<h2 id="welcomeUser">Welcome</h2>

<button id="logoutBtn">Logout</button>

</div>

<div class="profile-card">

<h3 id="userName">Loading...</h3>

<p>Coins</p>

<h1 id="userCoins">0</h1>

<p>Balance</p>

<h2 id="userBalance">0</h2>

</div>

<div class="reward-box">

<button id="dailyRewardBtn">

Daily Reward (+900)

</button>

<button id="liveRewardBtn">

Live Seat (+1200)

</button>

</div>
<div class="menu-grid">

<div class="menu-item">

<span>💰</span>

<p>Wallet</p>

</div>

<div class="menu-item">

<span>🎁</span>

<p>Gifts</p>

</div>

<div class="menu-item">

<span>👥</span>

<p>Friends</p>

</div>

<div class="menu-item">

<span>🏆</span>

<p>Ranking</p>

</div>

<div class="menu-item">

<span>🎤</span>

<p>Voice Room</p>

</div>

<div class="menu-item">

<span>👤</span>

<p>Profile</p>

</div>

<div class="menu-item">

<span>⚙️</span>

<p>Settings</p>

</div>

<div class="menu-item">

<span>📨</span>

<p>Messages</p>

</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="firebase.js"></script>

<script src="dashboard.js"></script>

</body>

</html>
