<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StarRoom Notifications</title>

<link rel="stylesheet" href="notification.css">

</head>

<body>

<div class="notification-box">

<h1>🔔 Notifications</h1>


<div class="notice verification">

<h3>✅ Verification Required</h3>

<p>Your account verification is pending.</p>

<button onclick="verifyNow()">Verify Now</button>

</div>


<div class="notice">

<h3>🎁 Gift Received</h3>

<p>You received a new gift from a user.</p>

</div>


<div class="notice">

<h3>🎉 Event Update</h3>

<p>New StarRoom event is available.</p>

</div>


<div class="notice">

<h3>📩 Admin Message</h3>

<p>Welcome to StarRoom family.</p>

</div>


</div>


<script src="notification.js"></script>

</body>
</html>
