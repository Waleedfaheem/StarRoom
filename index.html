<!-- StarRoom Logo -->

<div class="logo-box">

<img src="assets/logo.png" id="appLogo" alt="StarRoom Logo">

</div>

<h1>StarRoom</h1>

<p>Play • Win • Repeat</p>

<!-- Email -->

<input
type="email"
id="email"
placeholder="Email Address"
autocomplete="email">

<!-- Password -->

<input
type="password"
id="password"
placeholder="Password"
autocomplete="current-password">

<!-- Login -->

<button id="loginBtn">
LOGIN
</button>

<div class="divider">
<span>OR</span>
</div>

<!-- Google Login -->

<button id="googleLoginBtn" class="social-btn">

<img src="assets/google.png" alt="Google">

<span>Continue with Google</span>

</button>

<!-- Facebook Login -->

<button id="facebookLoginBtn" class="social-btn">

<img src="assets/facebook.png" alt="Facebook">

<span>Continue with Facebook</span>

</button>
<!-- Forgot Password -->

<div class="forgot-box">

<a href="forgot.html" id="forgotPassword">
Forgot Password?
</a>

</div>

<!-- Register -->

<div class="register-box">

<p>

Don't have an account?

<a href="register.html" id="registerLink">

Create Account

</a>

</p>

</div>

<!-- Loading -->

<div id="loadingScreen" class="loading-screen">

<div class="loader"></div>

<p>Please wait...</p>

</div>

<!-- Error Message -->

<div id="errorMessage" class="error-box"></div>

<!-- Success Message -->

<div id="successMessage" class="success-box"></div>
</div>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- JavaScript Files -->

<script src="firebase.js"></script>

<script src="script.js"></script>

</body>

</html>
