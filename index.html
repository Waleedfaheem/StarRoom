<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StarRoom Login</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="login-box">


<img src="assets/logo.png" class="logo" alt="StarRoom Logo">


<h1>StarRoom</h1>

<p>Welcome Back</p>


<input 
type="email" 
id="email" 
placeholder="Enter Email">


<input 
type="password" 
id="password" 
placeholder="Enter Password">


<button class="login-btn" onclick="login()">
LOGIN
</button>



<div class="or">

<span></span>
OR
<span></span>

</div>



<button onclick="googleSignIn()" class="social-btn">

<img src="assets/google.png" alt="Google">

Continue with Google

</button>



<button onclick="facebookSignIn()" class="social-btn">

<img src="assets/facebook.png" alt="Facebook">

Continue with Facebook

</button>



<div class="links">

<a href="#">
Forgot Password?
</a>

<br><br>

<a href="register.html">
Create New Account
</a>

</div>



</div>


<script src="firebase.js"></script>

<script src="script.js"></script>


</body>

</html>
