<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StarRoom Buy Coins</title>

<link rel="stylesheet" href="buy-coins.css">

</head>


<body>


<div class="buy-container">


<h1>💎 Buy Coins</h1>


<div class="payment-box">


<h2>🟢 EasyPaisa</h2>

<p>Account Name:</p>

<h3 id="easyName">
Your Name
</h3>

<p>Account Number:</p>

<h3 id="easyNumber">
Your Number
</h3>


</div>



<div class="payment-box">


<h2>🟣 JazzCash</h2>

<p>Account Name:</p>

<h3 id="jazzName">
Your Name
</h3>

<p>Account Number:</p>

<h3 id="jazzNumber">
Your Number
</h3>


</div>




<h2 class="title">
🪙 Select Coin Package
</h2>



<div class="package">


<h3>🪙 10,000 Coins</h3>

<p>💰 300 PKR</p>

<button onclick="buyCoins(10000,300)">
Buy Now
</button>


</div>



<div class="package">


<h3>🪙 20,000 Coins</h3>

<p>💰 600 PKR</p>

<button onclick="buyCoins(20000,600)">
Buy Now
</button>


</div>




<div class="package">


<h3>🪙 30,000 Coins</h3>

<p>💰 1000 PKR</p>

<button onclick="buyCoins(30000,1000)">
Buy Now
</button>


</div>



<div class="whatsapp">

<a href="#" onclick="openWhatsApp()">

🟢

</a>

</div>


</div>



<script src="firebase.js"></script>
<script src="buy-coins.js"></script>


</body>

</html>
